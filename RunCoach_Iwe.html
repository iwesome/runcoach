<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RunCoach">
<meta name="theme-color" content="#0EA5E9">
<title>RunCoach — Iwe</title>
<style>
:root{--sky:#0EA5E9;--sky2:#0284C7;--skylt:#E0F2FE;--green:#22C55E;--greenlt:#DCFCE7;--orange:#F97316;--orangelt:#FFF7ED;--red:#EF4444;--redlt:#FEE2E2;--purple:#8B5CF6;--purplelt:#EDE9FE;--g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;--g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;--g800:#1F2937;--g900:#111827}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--g900);overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;background:#fff;position:relative;overflow:hidden}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + env(safe-area-inset-bottom,0px));display:none}
.screen.active{display:block}
/* NAV */
.navbar{position:absolute;bottom:0;left:0;right:0;height:calc(64px + env(safe-area-inset-bottom,0px));background:#fff;border-top:1px solid var(--g200);display:flex;align-items:flex-start;padding-top:8px;padding-bottom:env(safe-area-inset-bottom,0px);z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;border:none;background:none}
.nav-icon{font-size:22px;color:var(--g300)}
.nav-label{font-size:10px;color:var(--g400);font-weight:500}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--sky)}
/* HEADER */
.ph{padding:calc(16px + env(safe-area-inset-top,0px)) 20px 12px;background:#fff;border-bottom:1px solid var(--g100)}
.pt{font-size:22px;font-weight:800;color:var(--g900)}
.ps{font-size:13px;color:var(--g500);margin-top:2px}
/* CARD */
.card{background:#fff;border-radius:16px;border:1px solid var(--g200);margin:0 16px 12px;overflow:hidden}
.cb{padding:16px}
.sl{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.6px;padding:14px 20px 6px}
/* BUTTON */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px 20px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s,transform .1s;width:100%}
.btn:active{transform:scale(.97);opacity:.85}
.btn-sky{background:var(--sky);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-gray{background:var(--g100);color:var(--g700)}
/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.b-sky{background:var(--skylt);color:var(--sky2)}
.b-green{background:var(--greenlt);color:#15803D}
.b-orange{background:var(--orangelt);color:#C2410C}
.b-purple{background:var(--purplelt);color:#6D28D9}
.b-gray{background:var(--g100);color:var(--g600)}
.b-red{background:var(--redlt);color:#B91C1C}
/* PROGRESS */
.prog{height:6px;background:var(--g100);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--sky);border-radius:3px;transition:width .4s}
/* TOAST */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:var(--g900);color:#fff;padding:10px 20px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center}
.mo.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:430px;max-height:92vh;overflow-y:auto}
.mh{width:36px;height:4px;background:var(--g200);border-radius:2px;margin:0 auto 16px}
.mt{font-size:18px;font-weight:800;margin-bottom:16px}
/* FORM */
.fg{margin-bottom:14px}
.fl{font-size:13px;font-weight:600;color:var(--g600);margin-bottom:5px;display:block}
.fi,.fs,.fta{width:100%;padding:11px 14px;border:1.5px solid var(--g200);border-radius:10px;font-size:15px;color:var(--g900);background:var(--g50);font-family:inherit}
.fi:focus,.fs:focus,.fta:focus{outline:none;border-color:var(--sky);background:#fff}
.fta{resize:none;line-height:1.5}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* TODAY HERO */
.hero{background:linear-gradient(135deg,var(--sky),var(--sky2));margin:16px;border-radius:20px;padding:18px;color:#fff}
.hero-lbl{font-size:12px;opacity:.8;margin-bottom:3px}
.hero-title{font-size:22px;font-weight:800;margin-bottom:4px}
.hero-sub{font-size:13px;opacity:.8;line-height:1.5;margin-bottom:14px}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.2);border-radius:10px;overflow:hidden}
.hs{background:rgba(255,255,255,.15);padding:10px;text-align:center}
.hs-v{font-size:18px;font-weight:800}
.hs-l{font-size:10px;opacity:.7;margin-top:1px}
.hero-btn{margin-top:12px;background:#fff;color:var(--sky);border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;width:100%;cursor:pointer}
/* DAY STRIP */
.ds{display:flex;border-bottom:1px solid var(--g100);overflow-x:auto;scrollbar-width:none}
.ds::-webkit-scrollbar{display:none}
.dc{flex:0 0 calc(100%/7);display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;border-bottom:3px solid transparent}
.dc.active{border-bottom-color:var(--sky)}
.dc-day{font-size:9px;color:var(--g400);font-weight:700;text-transform:uppercase}
.dc-num{font-size:16px;font-weight:700;color:var(--g700);margin-top:1px}
.dc.active .dc-num{color:var(--sky)}
.dc-dot{width:5px;height:5px;border-radius:50%;margin-top:4px;background:var(--g200)}
.dot-run{background:var(--sky)}
.dot-done{background:var(--green)}
.dot-rest{background:var(--g200)}
/* SCHED ITEM */
.si{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--g100);cursor:pointer}
.si:active{background:var(--g50)}
.si-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.si-info{flex:1}
.si-name{font-size:15px;font-weight:700;color:var(--g900)}
.si-det{font-size:12px;color:var(--g500);margin-top:2px}
.si-km{font-size:15px;font-weight:800;color:var(--sky)}
/* FEEL */
.feel-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.fo{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border-radius:10px;border:1.5px solid var(--g200);cursor:pointer;background:#fff}
.fo.sel{border-color:var(--sky);background:var(--skylt)}
.fe{font-size:20px}
.fl2{font-size:9px;color:var(--g500);font-weight:600;text-align:center}
.fo.sel .fl2{color:var(--sky2)}
/* RPE */
.rpe-val{font-size:28px;font-weight:800;color:var(--sky);text-align:center;margin:4px 0}
.rpe-lbl{font-size:12px;color:var(--g500);text-align:center}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:var(--g200);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--sky);cursor:pointer;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
/* LOG ITEM */
.li{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid var(--g100)}
.li-date{display:flex;flex-direction:column;align-items:center;background:var(--skylt);border-radius:10px;padding:8px 10px;min-width:44px}
.li-day{font-size:18px;font-weight:800;color:var(--sky);line-height:1}
.li-mon{font-size:10px;color:var(--sky2);font-weight:700;text-transform:uppercase}
.li-info{flex:1}
.li-title{font-size:14px;font-weight:700;color:var(--g900)}
.li-meta{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap}
.li-m{font-size:12px;color:var(--g500)}
.li-m b{color:var(--g800);font-weight:700}
/* STAT CHIP */
.sc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 12px}
.sc{background:var(--g50);border-radius:12px;padding:12px;text-align:center;border:1px solid var(--g100)}
.sc-v{font-size:20px;font-weight:800;color:var(--g900)}
.sc-l{font-size:10px;color:var(--g500);margin-top:2px}
/* BAR CHART */
.bar-wrap{padding:0 16px 4px}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:100px;margin-top:6px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.bar{width:100%;border-radius:4px 4px 0 0;background:var(--skylt);border:1px solid var(--sky);min-height:3px}
.bar.now{background:var(--sky)}
.bar-l{font-size:9px;color:var(--g400)}
.bar-v{font-size:9px;color:var(--g600);font-weight:700}
/* PB */
.pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
.pb{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:14px}
.pb-l{font-size:11px;color:var(--g500);font-weight:600;margin-bottom:4px}
.pb-v{font-size:20px;font-weight:800;color:var(--g900)}
.pb-s{font-size:11px;color:var(--g400);margin-top:2px}
/* RACE CARD */
.race-card{background:linear-gradient(135deg,#7C3AED,#6D28D9);border-radius:16px;padding:16px;margin:0 16px 12px;color:#fff}
.rc-name{font-size:17px;font-weight:800;margin-bottom:2px}
.rc-date{font-size:12px;opacity:.8;margin-bottom:12px}
.rc-countdown{display:flex;gap:16px}
.rc-item{text-align:center}
.rc-num{font-size:26px;font-weight:900}
.rc-lbl{font-size:9px;opacity:.75;text-transform:uppercase}
/* TIP BOX */
.tip{background:var(--skylt);border-radius:12px;padding:12px;border-left:3px solid var(--sky)}
.tip-t{font-size:11px;font-weight:800;color:var(--sky2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.tip-b{font-size:13px;color:var(--g700);line-height:1.55}
/* INSTALL BANNER */
.ib{background:var(--skylt);border:1px solid var(--sky);border-radius:12px;padding:12px 14px;margin:12px 16px 0;display:flex;align-items:center;gap:10px}
.ib-text{flex:1;font-size:12px;color:var(--sky2);line-height:1.5}
.ib-x{background:none;border:none;font-size:18px;color:var(--sky2);cursor:pointer;padding:2px}
/* WEEK NAV */
.wn{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--g100)}
.wn-t{font-size:14px;font-weight:700;color:var(--g800)}
.wn-btn{background:none;border:none;font-size:22px;color:var(--g500);cursor:pointer;padding:4px 8px}
/* EMPTY */
.empty{padding:48px 32px;text-align:center}
.empty-i{font-size:48px;margin-bottom:12px}
.empty-t{font-size:17px;font-weight:700;color:var(--g700);margin-bottom:6px}
.empty-s{font-size:13px;color:var(--g400);line-height:1.5}
/* PROFILE */
.av{width:72px;height:72px;border-radius:50%;background:var(--skylt);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:var(--sky);margin:0 auto 10px}
/* DIVIDER */
.div{height:1px;background:var(--g100);margin:0 16px}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- APP -->
<div class="app" id="app">

  <!-- TODAY -->
  <div class="screen active" id="sc-today">
    <div id="today-wrap"></div>
  </div>

  <!-- SCHEDULE -->
  <div class="screen" id="sc-schedule">
    <div class="ph"><div class="pt">Jadwal Latihan</div><div class="ps">Selasa · Kamis · Sabtu · Minggu</div></div>
    <div class="wn">
      <button class="wn-btn" onclick="chWeek(-1)">‹</button>
      <div class="wn-t" id="week-range"></div>
      <button class="wn-btn" onclick="chWeek(1)">›</button>
    </div>
    <div class="ds" id="day-strip"></div>
    <div id="sched-content"></div>
  </div>

  <!-- LOG -->
  <div class="screen" id="sc-log">
    <div class="ph">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="pt">Log Lari</div><div class="ps">56 sesi dari Strava</div></div>
        <button class="btn btn-sky" style="width:auto;padding:10px 16px;font-size:14px;border-radius:10px" onclick="openLogModal()">+ Catat</button>
      </div>
    </div>
    <div id="log-content"></div>
  </div>

  <!-- PROGRESS -->
  <div class="screen" id="sc-progress">
    <div class="ph"><div class="pt">Progress</div><div class="ps">Data dari Strava kamu</div></div>
    <div id="prog-content"></div>
  </div>

  <!-- PROFILE -->
  <div class="screen" id="sc-profile">
    <div class="ph"><div class="pt">Profil</div></div>
    <div id="prof-content"></div>
  </div>

  <!-- NAV -->
  <div class="navbar">
    <button class="nav-item active" id="nav-today" onclick="showScreen('today')"><span class="nav-icon">🏠</span><span class="nav-label">Hari Ini</span></button>
    <button class="nav-item" id="nav-schedule" onclick="showScreen('schedule')"><span class="nav-icon">📅</span><span class="nav-label">Jadwal</span></button>
    <button class="nav-item" id="nav-log" onclick="showScreen('log')"><span class="nav-icon">✍️</span><span class="nav-label">Log</span></button>
    <button class="nav-item" id="nav-progress" onclick="showScreen('progress')"><span class="nav-icon">📊</span><span class="nav-label">Progress</span></button>
    <button class="nav-item" id="nav-profile" onclick="showScreen('profile')"><span class="nav-icon">👤</span><span class="nav-label">Profil</span></button>
  </div>
</div>

<!-- LOG MODAL -->
<div class="mo" id="log-modal">
  <div class="modal">
    <div class="mh"></div>
    <div class="mt">✍️ Catat Lari</div>
    <div class="fr">
      <div class="fg"><label class="fl">Jarak (km)</label><input class="fi" type="number" id="l_dist" placeholder="6.5" step="0.1" oninput="calcPace()"></div>
      <div class="fg"><label class="fl">Durasi (mnt)</label><input class="fi" type="number" id="l_dur" placeholder="60" oninput="calcPace()"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Pace (auto)</label><input class="fi" type="text" id="l_pace" readonly style="background:var(--g100);color:var(--g600)"></div>
      <div class="fg"><label class="fl">Heart rate</label><input class="fi" type="number" id="l_hr" placeholder="148"></div>
    </div>
    <div class="fg">
      <label class="fl">Tipe latihan</label>
      <select class="fs" id="l_type">
        <option>Easy Run</option><option>Tempo Run</option><option>Long Run</option>
        <option>Interval</option><option>Fartlek</option><option>Recovery Run</option>
      </select>
    </div>
    <div class="fg">
      <label class="fl">Perasaan</label>
      <div class="feel-grid">
        <div class="fo" onclick="selFeel(1,this)"><span class="fe">😫</span><span class="fl2">Berat banget</span></div>
        <div class="fo" onclick="selFeel(2,this)"><span class="fe">😤</span><span class="fl2">Berat</span></div>
        <div class="fo sel" onclick="selFeel(3,this)"><span class="fe">😊</span><span class="fl2">Oke</span></div>
        <div class="fo" onclick="selFeel(4,this)"><span class="fe">😄</span><span class="fl2">Bagus</span></div>
        <div class="fo" onclick="selFeel(5,this)"><span class="fe">🤩</span><span class="fl2">Luar biasa</span></div>
      </div>
    </div>
    <div class="fg">
      <label class="fl">RPE (1–10)</label>
      <input type="range" id="l_rpe" min="1" max="10" value="5" oninput="updRPE()">
      <div class="rpe-val" id="rpe-v">5</div>
      <div class="rpe-lbl" id="rpe-l">Sedang</div>
    </div>
    <div class="fg"><label class="fl">Catatan</label><textarea class="fta" id="l_notes" rows="2" placeholder="Rute, cuaca, perasaan..."></textarea></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-gray" style="flex:1" onclick="closeModal('log-modal')">Batal</button>
      <button class="btn btn-green" style="flex:2" onclick="saveLog()">Simpan 💾</button>
    </div>
  </div>
</div>

<!-- WORKOUT MODAL -->
<div class="mo" id="wo-modal">
  <div class="modal">
    <div class="mh"></div>
    <div id="wo-content"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-gray" style="flex:1" onclick="closeModal('wo-modal')">Tutup</button>
      <button class="btn btn-sky" style="flex:2" onclick="closeModal('wo-modal');openLogModal()">Catat Lari ✍️</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA — dari file Strava & ICS kamu

// Merge history: Strava + new logs
function allLogs(){
  const strava = HISTORY_RAW.map(r=>({d:r.d,n:r.n,km:r.km,min:r.min,p:r.p,hr:r.hr,cal:r.cal,src:'strava',feel:3,rpe:5,notes:''}));
  return [...strava,...(S.newLogs||[])].sort((a,b)=>b.d.localeCompare(a.d));
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('sc-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='today') renderToday();
  if(name==='schedule') renderSchedule();
  if(name==='log') renderLog();
  if(name==='progress') renderProgress();
  if(name==='profile') renderProfile();
}

function renderToday(){
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const sess = PLAN.find(p=>p.d===today);
  const logs = allLogs();
  const isLogged = logs.some(l=>l.d===today);
  const streak = calcStreak(logs);
  const hour = now.getHours();
  const greet = hour<12?'Selamat pagi':hour<17?'Selamat siang':'Selamat sore';
  const raceDate = new Date('2027-05-27');
  const daysToRace = Math.ceil((raceDate-now)/(1000*60*60*24));
  const weeksToRace = Math.floor(daysToRace/7);
  const daysRem = daysToRace%7;

  // find current week num
  const firstPlan = new Date(PLAN[0].d);
  const weekNum = Math.max(1,Math.floor((now-firstPlan)/(7*24*3600*1000))+1);
  const totalWeeks = 48;
  const progress = Math.min(100,Math.round((weekNum/totalWeeks)*100));

  let html = '';

  // install banner
  if(!localStorage.getItem('rc_ib_dismissed')){
    html += `<div class="ib" id="ib">
      <div style="font-size:22px">📲</div>
      <div class="ib-text">Buka di <strong>Safari</strong> → Share ↑ → <strong>Add to Home Screen</strong> agar seperti app beneran</div>
      <button class="ib-x" onclick="localStorage.setItem('rc_ib_dismissed','1');document.getElementById('ib').remove()">✕</button>
    </div>`;
  }

  // greeting
  html += `<div style="padding:16px 20px 8px;display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-size:13px;color:var(--g500)">${greet},</div>
      <div style="font-size:21px;font-weight:800;color:var(--g900)">Iwe 👋</div>
    </div>
    <div style="background:#FFF7ED;border-radius:14px;padding:8px 14px;text-align:center">
      <div style="font-size:22px">🔥</div>
      <div style="font-size:17px;font-weight:900;color:var(--orange)">${streak}</div>
      <div style="font-size:9px;color:var(--g400);font-weight:700">STREAK</div>
    </div>
  </div>`;

  // plan progress
  html += `<div style="padding:4px 20px 14px">
    <div style="display:flex;justify-content:space-between;margin-bottom:5px">
      <div style="font-size:12px;color:var(--g500);font-weight:600">Program 35K · Mei 2027</div>
      <div style="font-size:12px;font-weight:800;color:var(--sky)">Minggu ${weekNum}/${totalWeeks}</div>
    </div>
    <div class="prog"><div class="prog-fill" style="width:${progress}%"></div></div>
  </div>`;

  // race countdown
  html += `<div class="race-card">
    <div class="rc-name">🏅 35K Race Day</div>
    <div class="rc-date">27 Mei 2027</div>
    <div class="rc-countdown">
      <div class="rc-item"><div class="rc-num">${weeksToRace}</div><div class="rc-lbl">Minggu</div></div>
      <div class="rc-item"><div class="rc-num">${daysRem}</div><div class="rc-lbl">Hari</div></div>
      <div class="rc-item"><div class="rc-num">${daysToRace}</div><div class="rc-lbl">Total hari</div></div>
    </div>
  </div>`;

  // today workout
  if(isLogged){
    html += `<div class="card"><div class="cb" style="text-align:center;padding:28px 16px">
      <div style="font-size:48px;margin-bottom:8px">✅</div>
      <div style="font-size:18px;font-weight:800;color:var(--g900);margin-bottom:4px">Sesi hari ini selesai!</div>
      <div style="font-size:13px;color:var(--g500)">Kerja bagus Iwe! Recovery yang baik ya.</div>
    </div></div>`;
  } else if(sess){
    const col = TYPE_COLOR[sess.type]||'var(--sky)';
    const bg = TYPE_BG[sess.type]||'var(--skylt)';
    html += `<div class="hero" style="background:linear-gradient(135deg,${col},${col}CC)">
      <div class="hero-lbl">Hari ini · ${DAYS_F[now.getDay()]}, ${now.getDate()} ${MONTHS[now.getMonth()]}</div>
      <div class="hero-title">${TYPE_ICON[sess.type]||'🏃'} ${sess.t}</div>
      <div class="hero-sub">Minggu ${sess.w} · ${TYPE_TIPS[sess.type]||''}</div>
      <div class="hero-stats">
        <div class="hs"><div class="hs-v">${sess.k}</div><div class="hs-l">km</div></div>
        <div class="hs"><div class="hs-v">${Math.round(sess.k*parseFloat(sess.p.split(':')[0])+(sess.k*parseInt(sess.p.split(':')[1])/60)).toString().replace('NaN','—')}</div><div class="hs-l">mnt est.</div></div>
        <div class="hs"><div class="hs-v">${sess.p}</div><div class="hs-l">/km pace</div></div>
      </div>
      <button class="hero-btn" onclick="openWO()">Lihat Detail Latihan →</button>
    </div>
    <div style="padding:0 16px 14px"><button class="btn btn-green" onclick="openLogModal()">✍️ Catat setelah lari</button></div>`;
  } else {
    const dow = now.getDay();
    const isRunDay = [2,4,6,0].includes(dow); // Sel,Kam,Sab,Min
    if(isRunDay){
      html += `<div class="card"><div class="cb" style="text-align:center;padding:24px">
        <div style="font-size:36px;margin-bottom:8px">📅</div>
        <div style="font-size:16px;font-weight:700;color:var(--g800);margin-bottom:4px">Belum ada sesi terjadwal hari ini</div>
        <div style="font-size:13px;color:var(--g500)">Program dimulai 23 Juni 2026</div>
      </div></div>`;
    } else {
      html += `<div class="card"><div class="cb" style="background:var(--greenlt);border-radius:14px">
        <div style="font-size:32px;margin-bottom:6px">💤</div>
        <div style="font-size:17px;font-weight:800;color:#166534;margin-bottom:4px">Hari Istirahat</div>
        <div style="font-size:13px;color:#166534;opacity:.8;line-height:1.5">Hari ini ${DAYS_F[dow]} — bukan hari lari. Lakukan stretching ringan atau istirahat total.</div>
      </div></div>`;
    }
  }

  // recent 3 runs
  const recent = allLogs().slice(0,3);
  if(recent.length){
    html += `<div class="sl">Lari Terakhir</div>`;
    recent.forEach(l=>{ html += logItem(l); });
  }

  document.getElementById('today-wrap').innerHTML = html;
}

function openWO(){
  const today = new Date().toISOString().slice(0,10);
  const sess = PLAN.find(p=>p.d===today);
  if(!sess) return;
  showWorkoutModal(sess);
}

function showWorkoutModal(sess){
  const col = TYPE_COLOR[sess.type]||'var(--sky)';
  const bg = TYPE_BG[sess.type]||'var(--skylt)';
  const steps = getSteps(sess);
  let html = `<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:14px">
    <div style="flex:1">
      <div style="font-size:19px;font-weight:800;color:var(--g900)">${TYPE_ICON[sess.type]||'🏃'} ${sess.t}</div>
      <div style="font-size:12px;color:var(--g500);margin-top:2px">Minggu ${sess.w} · ${sess.k}km · pace target ${sess.p}/km</div>
    </div>
    <span class="badge b-sky">${sess.type}</span>
  </div>
  <div style="margin-bottom:14px">
    <div class="sl" style="padding:0 0 8px">Struktur Latihan</div>`;
  steps.forEach(st=>{
    html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--g100)">
      <div style="width:36px;height:36px;border-radius:50%;background:${st.bg};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${st.icon}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:700;color:var(--g900)">${st.name}</div><div style="font-size:11px;color:var(--g500);margin-top:1px">${st.sub}</div></div>
      <div style="font-size:13px;font-weight:800;color:${col}">${st.dur}</div>
    </div>`;
  });
  html += `</div>
  <div class="tip"><div class="tip-t">💡 Tips Coach</div><div class="tip-b">${TYPE_TIPS[sess.type]||''}</div></div>
  <div style="margin-top:12px;background:var(--g50);border-radius:12px;padding:12px;font-size:13px;color:var(--g700);line-height:1.7">
    ✅ Minum 500ml air 30 mnt sebelum<br>
    ✅ Warm-up dynamic 5 mnt (leg swings, high knees)<br>
    ${sess.k>=12?'✅ Bawa minum / gel energi untuk lari panjang':'✅ Cukup air putih dan snack ringan'}
  </div>`;
  document.getElementById('wo-content').innerHTML = html;
  document.getElementById('wo-modal').classList.add('open');
}

function getSteps(sess){
  if(sess.type==='easy') return [
    {icon:'🚶',name:'Warm-up jalan',sub:'Jalan cepat, gerakkan sendi',dur:'5 mnt',bg:TYPE_BG.tempo},
    {icon:'🏃',name:'Easy Run',sub:'Zona 2, bisa ngobrol',dur:`${Math.round(sess.k*parseFloat(sess.p)-(sess.k*5))} mnt`,bg:TYPE_BG.easy},
    {icon:'🧘',name:'Cool-down',sub:'Jalan santai + stretch',dur:'5 mnt',bg:TYPE_BG.long}
  ];
  if(sess.type==='tempo') return [
    {icon:'🚶',name:'Warm-up jog',sub:'Easy pace 10 mnt',dur:'10 mnt',bg:TYPE_BG.easy},
    {icon:'⚡',name:'Tempo',sub:`Pace ${sess.p}/km, terkontrol`,dur:`${Math.round(sess.k*0.5)} mnt`,bg:TYPE_BG.tempo},
    {icon:'🏃',name:'Cool-down jog',sub:'Pelan, turunkan HR',dur:'10 mnt',bg:TYPE_BG.easy}
  ];
  if(sess.type==='long') return [
    {icon:'🏃',name:'Easy start',sub:'10 mnt pertama paling santai',dur:'10 mnt',bg:TYPE_BG.easy},
    {icon:'🌅',name:'Long steady run',sub:`Pace ${sess.p}/km konsisten`,dur:`${Math.round(sess.k*parseFloat(sess.p.split(':')[0]))-20} mnt`,bg:TYPE_BG.long},
    {icon:'🧘',name:'Cool-down',sub:'Jalan + full stretch 10 mnt',dur:'10 mnt',bg:TYPE_BG.easy}
  ];
  if(sess.type==='interval') return [
    {icon:'🏃',name:'Warm-up jog',sub:'Easy 10 mnt',dur:'10 mnt',bg:TYPE_BG.easy},
    {icon:'💥',name:'Hard effort',sub:'Pace lebih cepat dari tempo',dur:'repeats',bg:TYPE_BG.interval},
    {icon:'🏃',name:'Recovery jog',sub:'Antar repetisi, pelan',dur:'antara',bg:TYPE_BG.easy},
    {icon:'🧘',name:'Cool-down',sub:'Easy jog 10 mnt',dur:'10 mnt',bg:TYPE_BG.easy}
  ];
  return [];
}

// ============================================================
// SCHEDULE
// ============================================================
function renderSchedule(){
  renderWeekRange();
  renderDayStrip();
  renderSchedContent();
}

function renderWeekRange(){
  const now = new Date();
  const ws = new Date(now);
  ws.setDate(now.getDate()-now.getDay()+(S.weekOffset*7));
  const we = new Date(ws); we.setDate(ws.getDate()+6);
  document.getElementById('week-range').textContent = `${ws.getDate()} ${MONTHS[ws.getMonth()]} — ${we.getDate()} ${MONTHS[we.getMonth()]}`;
}

function renderDayStrip(){
  const now = new Date();
  const ws = new Date(now);
  ws.setDate(now.getDate()-now.getDay()+(S.weekOffset*7));
  const logs = allLogs().map(l=>l.d);
  let html='';
  for(let d=0;d<7;d++){
    const dt = new Date(ws); dt.setDate(ws.getDate()+d);
    const ds = dt.toISOString().slice(0,10);
    const isToday = ds===new Date().toISOString().slice(0,10);
    const isActive = d===S.selDay;
    const isDone = logs.includes(ds);
    const hasSess = PLAN.some(p=>p.d===ds);
    const dotCls = isDone?'dot-done':hasSess?'dot-run':'dot-rest';
    html += `<div class="dc${isActive?' active':''}" onclick="selDay(${d})">
      <div class="dc-day">${DAYS_S[d]}</div>
      <div class="dc-num" style="${isToday?'color:var(--sky);font-weight:900':''}">${dt.getDate()}</div>
      <div class="dc-dot ${dotCls}"></div>
    </div>`;
  }
  document.getElementById('day-strip').innerHTML = html;
}

function selDay(d){S.selDay=d;renderDayStrip();renderSchedContent();}

function renderSchedContent(){
  const now = new Date();
  const ws = new Date(now);
  ws.setDate(now.getDate()-now.getDay()+(S.weekOffset*7));
  const dt = new Date(ws); dt.setDate(ws.getDate()+S.selDay);
  const ds = dt.toISOString().slice(0,10);
  const sess = PLAN.find(p=>p.d===ds);
  const isToday = ds===new Date().toISOString().slice(0,10);
  const isDone = allLogs().some(l=>l.d===ds);
  const el = document.getElementById('sched-content');

  if(!sess){
    el.innerHTML = `<div class="empty"><div class="empty-i">💤</div><div class="empty-t">Hari Istirahat</div><div class="empty-s">Tidak ada sesi lari hari ini. Gunakan untuk recovery aktif atau stretching.</div></div>`;
    return;
  }

  const col = TYPE_COLOR[sess.type]||'var(--sky)';
  const bg = TYPE_BG[sess.type]||'var(--skylt)';
  const icon = TYPE_ICON[sess.type]||'🏃';
  let html = `<div class="si" onclick="showWorkoutModal(PLAN.find(p=>p.d==='${ds}'))">
    <div class="si-icon" style="background:${bg};font-size:22px">${icon}</div>
    <div class="si-info">
      <div class="si-name">${sess.t}</div>
      <div class="si-det">Pace target ${sess.p}/km · Minggu ${sess.w}</div>
      <div style="margin-top:5px;display:flex;gap:6px">
        ${isToday?'<span class="badge b-sky">Hari ini</span>':''}
        ${isDone?'<span class="badge b-green">✓ Sudah dicatat</span>':''}
      </div>
    </div>
    <div style="text-align:right"><div class="si-km">${sess.k}km</div><div style="color:var(--g300);font-size:18px">›</div></div>
  </div>
  <div style="padding:12px 20px">
    <div class="tip"><div class="tip-t">💡 Tips</div><div class="tip-b">${TYPE_TIPS[sess.type]||''}</div></div>
    ${!isDone?`<div style="margin-top:12px"><button class="btn btn-sky" onclick="openLogModal()">✍️ Catat lari ini</button></div>`:''}
  </div>`;
  el.innerHTML = html;
}

function chWeek(dir){S.weekOffset+=dir;S.selDay=new Date().getDay();renderWeekRange();renderDayStrip();renderSchedContent();}

// ============================================================
// LOG
// ============================================================
function renderLog(){
  const logs = allLogs();
  const el = document.getElementById('log-content');
  if(!logs.length){
    el.innerHTML = `<div class="empty"><div class="empty-i">✍️</div><div class="empty-t">Belum ada log</div></div>`;

  el.innerHTML = logs.map(l=>logItem(l)).join('');

function logItem(l){
  const d = new Date(l.d+'T00:00:00');

    <div class="li-info">
      <div class="li-title">${feel} ${l.n||l.type||'Lari'} ${src}</div>
      <div class="li-meta">

        <div class="li-m"><b>${l.min}</b> mnt</div>
        <div class="li-m"><b>${l.p}</b>/km</div>
        ${l.hr?`<div class="li-m"><b>${l.hr}</b> bpm</div>`:''}

}

  <div class="pb-grid">
    <div class="pb"><div class="pb-l">⚡ Pace terbaik</div><div class="pb-v">${bestPace}</div><div class="pb-s">per km</div></div>

    <div class="pb"><div class="pb-l">📅 Km/minggu terbaik</div><div class="pb-v">${bestWeekKm}</div><div class="pb-s">km</div></div>
  </div>

  <div class="sl">Race yang sudah diikuti</div>
  <div style="padding:0 16px 24px">
    <div style="background:var(--g50);border-radius:12px;padding:14px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="font-size:24px">🏅</span>
        <div><div style="font-size:14px;font-weight:700;color:var(--g900)">Yellow Run 2026</div>
        <div style="font-size:12px;color:var(--g500)">7 Juni 2026 · 5.0 km · pace 6:46 · HR 175</div></div>
      </div>
    </div>
  </div>`;

  document.getElementById('prog-content').innerHTML = html;
}

function getWeeklyKm(logs,n){
  const res=[];
  const now=new Date();
  for(let i=n-1;i>=0;i--){
    const ws=new Date(now);
    ws.setDate(now.getDate()-now.getDay()-i*7);
    ws.setHours(0,0,0,0);
    const we=new Date(ws);we.setDate(ws.getDate()+7);
    const km=logs.filter(l=>{const d=new Date(l.d+'T00:00:00');return d>=ws&&d<we}).reduce((a,l)=>a+parseFloat(l.km||0),0);
    res.push({km:Math.round(km*10)/10,label:`W${n-i}`});
  }
  return res;
}

function getBestPace(logs){
  const paces=logs.map(l=>paceToSec(l.p)).filter(p=>p>0);
  if(!paces.length) return '—';
  return secToPace(Math.min(...paces));
}

function calcStreak(logs){
  if(!logs.length) return 0;
  const dates=[...new Set(logs.map(l=>l.d))].sort().reverse();
  let streak=0;
  const today=new Date().toISOString().slice(0,10);
  let check=new Date();
  for(let i=0;i<90;i++){
    const d=check.toISOString().slice(0,10);
    if(dates.includes(d)){streak++;}
    else if(d!==today) break;
    check.setDate(check.getDate()-1);
  }
  return streak;
}

function paceToSec(p){if(!p||p==='-'||p==='—')return 0;const pt=p.split(':');if(pt.length!==2)return 0;return parseInt(pt[0])*60+parseInt(pt[1]);}
function secToPace(s){const m=Math.floor(s/60);const sec=Math.round(s%60);return m+':'+String(sec).padStart(2,'0');}

// ============================================================
// LOG MODAL
// ============================================================
function openLogModal(){
  ['l_dist','l_dur','l_hr','l_notes','l_pace'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('l_rpe').value=5;
  document.getElementById('rpe-v').textContent='5';
  document.getElementById('rpe-l').textContent='Sedang';
  S.feel=3;
  document.querySelectorAll('.fo').forEach((o,i)=>o.classList.toggle('sel',i===2));
  document.getElementById('log-modal').classList.add('open');
}

function calcPace(){
  const dist=parseFloat(document.getElementById('l_dist').value);
  const dur=parseFloat(document.getElementById('l_dur').value);
  if(dist>0&&dur>0){
    const pm=dur/dist;
    const m=Math.floor(pm);
    const s=Math.round((pm-m)*60);
    document.getElementById('l_pace').value=m+':'+String(s).padStart(2,'0');
  } else {
    document.getElementById('l_pace').value='';
  }
}

function selFeel(v,el){
  S.feel=v;
  document.querySelectorAll('.fo').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}

function updRPE(){
  const v=parseInt(document.getElementById('l_rpe').value);
  document.getElementById('rpe-v').textContent=v;
  document.getElementById('rpe-l').textContent=RPE_L[v]||'';
}

function saveLog(){
  const dist=parseFloat(document.getElementById('l_dist').value);
  const dur=parseInt(document.getElementById('l_dur').value);
  if(!dist||!dur){showToast('Isi jarak dan durasi dulu!');return;}
  const now=new Date();
  const log={
    d:now.toISOString().slice(0,10),
    n:document.getElementById('l_type').value,
    km:dist.toFixed(1),
    min:dur,
    p:document.getElementById('l_pace').value||'—',
    hr:parseInt(document.getElementById('l_hr').value)||0,
    cal:0,
    feel:S.feel||3,
    rpe:parseInt(document.getElementById('l_rpe').value)||5,
    notes:document.getElementById('l_notes').value.trim(),
    src:'new'
  };
  if(!S.newLogs) S.newLogs=[];
  S.newLogs.push(log);
  save();
  closeModal('log-modal');
  showToast('Log tersimpan! 🎉');
  renderToday();
}

// UTILS
// ============================================================
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.querySelectorAll('.mo').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});});

// INIT
renderToday();
</script>
